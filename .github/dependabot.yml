version: 2
updates:
  # 自动更新 GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # 可选：自动合并小版本更新（需开启仓库权限）
    # automerge: true

  # 可选：自动更新 npm/pnpm 依赖（前端项目推荐）
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # 忽略大版本更新，避免破坏性变更
    # ignore:
    #   - dependency-name: "*"
    #     update-types: ["version-update:semver-major"]
