name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]  # 你的主分支是 master，已适配
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2  # 已升级 Node.js 24 兼容版

      - name: Setup Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: 24  # 已升级到 24，适配 Vercel 和 GitHub 最新要求
          cache: 'pnpm'

      # 修复淘宝镜像证书过期
      - name: Fix npm registry
        run: pnpm config set registry https://registry.npmmirror.com/

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm build  # 适配你的前端构建命令

      # 上传产物（已升级到 v4，解决弃用报错）
      - name: Upload artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: github-pages
          path: ./dist  # Vue/Vite/React 构建输出目录

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4  # 已升级 Node.js 24 兼容版
