name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

# 强制所有 JS Action 运行在 Node.js 24，消除弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js 24
        uses: actions/setup-node@v4.1.0
        with:
          node-version: 24
          # ❌ 关键修复：删除 cache: 'pnpm'，避免锁文件校验失败
          # cache: 'pnpm'

      # 修复镜像 + 彻底解决 pnpm 安装问题
      - name: Fix pnpm & install dependencies
        run: |
          # 全局安装最新版 pnpm
          npm install -g pnpm@latest
          # 切换到国内可用镜像，解决证书过期
          pnpm config set registry https://registry.npmmirror.com
          # 清理缓存 + 强制安装
          pnpm store prune
          pnpm install --force --no-frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: github-pages
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
